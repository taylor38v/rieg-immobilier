<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CMS - Romain Rieg Immobilier</title>
  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; }

    /* Header bleu navy + accent or */
    .nc-appHeader-content { background: #061b2c !important; }
    .nc-appHeader-button-active, .nc-appHeader-button:hover { color: #c9a25f !important; }

    /* Sidebar des collections - fond ivoire doux */
    [class*="WorkflowSidebar"], [class*="CollectionsSidebar"] {
      background: #f1ebdf !important;
    }

    /* Titres de section dans les formulaires (objects collapsed) - surligne en or */
    [class*="FieldsetHeading"] {
      background: linear-gradient(90deg, rgba(201,162,95,0.08), transparent) !important;
      border-left: 3px solid #c9a25f !important;
      padding-left: 12px !important;
    }

    /* Hints (textes explicatifs sous les champs) - plus visibles */
    [class*="FieldHint"] {
      color: #6b6355 !important;
      font-size: 12.5px !important;
      font-style: italic !important;
      line-height: 1.5 !important;
      margin-top: 4px !important;
    }

    /* Boutons sauver - couleurs site */
    [class*="ButtonsContainer"] button[class*="primary"] {
      background: #061b2c !important;
    }
    [class*="ButtonsContainer"] button[class*="primary"]:hover {
      background: #c9a25f !important;
      color: #061b2c !important;
    }

    /* Labels des champs en bleu navy */
    [class*="ControlLabel"] {
      color: #061b2c !important;
      font-weight: 500 !important;
    }

    /* Required marker en or au lieu de rouge */
    [class*="ControlLabel"] span {
      color: #c9a25f !important;
    }

    /* ─────────────────────────────────────────────
       POLISH AGRESSIF - vue liste des collections
       ───────────────────────────────────────────── */

    /* Fond global plus doux (gris très clair au lieu du blanc cru) */
    body { background: #f7f5f1 !important; }
    .CMS_App_main, [class*="MainContainer"], [class*="MainView"] { background: #f7f5f1 !important; }

    /* Sidebar Collections - fond ivoire avec ombre légère */
    [class*="SidebarStyle"], aside[class*="Sidebar"] {
      background: #faf6ef !important;
      box-shadow: 2px 0 12px rgba(6,27,44,.04) !important;
      border-right: 1px solid rgba(6,27,44,.06) !important;
    }
    [class*="SidebarHeading"] {
      font-family: 'Cormorant Garamond', Georgia, serif !important;
      font-size: 1.5rem !important;
      color: #061b2c !important;
      font-weight: 500 !important;
    }

    /* Sidebar items - hover + active */
    [class*="SidebarNavLink"], a[class*="NavLink"] {
      border-radius: 8px !important;
      margin-bottom: 2px !important;
      transition: all .15s ease !important;
      font-size: 14px !important;
      padding: 10px 14px !important;
    }
    [class*="SidebarNavLink"]:hover, a[class*="NavLink"]:hover {
      background: rgba(201,162,95,.1) !important;
      color: #061b2c !important;
    }
    [class*="SidebarNavLink"][class*="active"], a[class*="NavLink"][aria-current="page"] {
      background: #061b2c !important;
      color: #c9a25f !important;
      font-weight: 600 !important;
    }

    /* Recherche en sidebar - plus visible */
    [class*="SearchInput"] input, input[type="search"] {
      background: white !important;
      border: 1px solid rgba(6,27,44,.1) !important;
      border-radius: 999px !important;
      padding: 10px 16px 10px 38px !important;
      font-size: 13.5px !important;
      box-shadow: 0 1px 3px rgba(6,27,44,.04) !important;
    }
    [class*="SearchInput"] input:focus, input[type="search"]:focus {
      border-color: #c9a25f !important;
      box-shadow: 0 0 0 3px rgba(201,162,95,.15) !important;
      outline: none !important;
    }

    /* En-tête de collection (titre + bouton Créer) */
    [class*="CollectionTopRow"], [class*="CollectionHeader"] {
      background: white !important;
      border-radius: 14px !important;
      box-shadow: 0 2px 12px rgba(6,27,44,.06) !important;
      padding: 28px 32px !important;
      margin-bottom: 24px !important;
      border: 1px solid rgba(6,27,44,.04) !important;
    }
    [class*="CollectionTopRow"] h1, [class*="CollectionHeader"] h1, h1[class*="Collection"] {
      font-family: 'Cormorant Garamond', Georgia, serif !important;
      font-size: 2.25rem !important;
      color: #061b2c !important;
      font-weight: 500 !important;
      letter-spacing: -0.01em !important;
    }

    /* Bouton "Créer une entrée" - gold accent */
    [class*="CollectionTopRow"] a[class*="Button"],
    [class*="CollectionHeader"] a[class*="Button"],
    a[class*="NewEntry"] {
      background: linear-gradient(135deg, #061b2c 0%, #0f2c44 100%) !important;
      color: #c9a25f !important;
      border: none !important;
      padding: 12px 24px !important;
      border-radius: 999px !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      letter-spacing: 0.04em !important;
      text-transform: none !important;
      box-shadow: 0 4px 14px rgba(6,27,44,.18) !important;
      transition: all .2s ease !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 8px !important;
    }
    [class*="CollectionTopRow"] a[class*="Button"]:hover,
    [class*="CollectionHeader"] a[class*="Button"]:hover,
    a[class*="NewEntry"]:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 6px 20px rgba(6,27,44,.25) !important;
      background: #c9a25f !important;
      color: #061b2c !important;
    }
    [class*="CollectionTopRow"] a[class*="Button"]::before,
    [class*="CollectionHeader"] a[class*="Button"]::before,
    a[class*="NewEntry"]::before {
      content: "✦";
      font-size: 14px;
      margin-right: 2px;
    }

    /* Toolbar avec tri/affichage - espacement propre */
    [class*="EntriesActions"], [class*="ViewControls"], [class*="ViewControlsToolbar"] {
      background: transparent !important;
      padding: 0 4px 12px !important;
      margin-bottom: 8px !important;
    }

    /* Cards d'entrée (mode liste OU grille) */
    [class*="Card-"], [class*="EntryCard"], [class*="ListCard"], [class*="EntryListing"] li {
      background: white !important;
      border-radius: 14px !important;
      border: 1px solid rgba(6,27,44,.06) !important;
      box-shadow: 0 1px 3px rgba(6,27,44,.04) !important;
      margin-bottom: 12px !important;
      padding: 20px 24px !important;
      transition: all .15s ease !important;
      position: relative !important;
      overflow: hidden !important;
    }
    [class*="Card-"]:hover, [class*="EntryCard"]:hover, [class*="ListCard"]:hover, [class*="EntryListing"] li:hover {
      box-shadow: 0 8px 24px rgba(6,27,44,.1) !important;
      border-color: #c9a25f !important;
      transform: translateY(-1px) !important;
    }
    /* Barre or à gauche au hover */
    [class*="Card-"]::before, [class*="EntryCard"]::before, [class*="ListCard"]::before, [class*="EntryListing"] li::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: #c9a25f;
      transition: height .3s ease;
    }
    [class*="Card-"]:hover::before, [class*="EntryCard"]:hover::before, [class*="ListCard"]:hover::before, [class*="EntryListing"] li:hover::before {
      height: 100%;
    }

    /* Titre dans la card */
    [class*="Card-"] h2, [class*="EntryCard"] h2, [class*="ListCard"] h2,
    [class*="Card-"] [class*="title"], [class*="ListCard"] [class*="title"] {
      font-family: 'Cormorant Garamond', Georgia, serif !important;
      font-size: 1.2rem !important;
      color: #061b2c !important;
      font-weight: 500 !important;
      line-height: 1.4 !important;
    }

    /* Mode grille - espacement plus aéré */
    [class*="EntriesGrid"], [class*="GridContainer"] {
      gap: 16px !important;
      padding: 4px !important;
    }
    [class*="EntriesGrid"] > div, [class*="GridContainer"] > div {
      background: white !important;
      border-radius: 14px !important;
      overflow: hidden !important;
      box-shadow: 0 2px 8px rgba(6,27,44,.06) !important;
      transition: all .2s ease !important;
    }
    [class*="EntriesGrid"] > div:hover, [class*="GridContainer"] > div:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(6,27,44,.12) !important;
    }

    /* Bouton "View as..." (liste/grille) - discret mais propre */
    [class*="ViewControls"] button, button[aria-label*="View"] {
      border: 1px solid rgba(6,27,44,.08) !important;
      border-radius: 8px !important;
      padding: 8px 10px !important;
      background: white !important;
      transition: all .15s ease !important;
    }
    [class*="ViewControls"] button:hover, button[aria-label*="View"]:hover {
      border-color: #c9a25f !important;
      background: rgba(201,162,95,.05) !important;
    }

    /* Pagination */
    [class*="Pagination"] button {
      border-radius: 999px !important;
      padding: 8px 14px !important;
    }

    /* État vide (pas d'entrée) */
    [class*="EmptyState"] {
      padding: 64px 32px !important;
      text-align: center !important;
      background: white !important;
      border-radius: 14px !important;
      box-shadow: 0 1px 3px rgba(6,27,44,.04) !important;
    }

    /* Bouton flottant Leads */
    #leadsTab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      background: #061b2c;
      color: #c9a25f;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-decoration: none;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(6, 27, 44, 0.35), 0 0 0 1px rgba(201, 162, 95, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #leadsTab:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(6, 27, 44, 0.4), 0 0 0 1px rgba(201, 162, 95, 0.7);
    }
    #leadsTab .badge {
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #c9a25f;
      color: #061b2c;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    #leadsTab .badge.empty {
      display: none;
    }
  </style>
</head>
<body>
  <a id="leadsTab" href="/admin/leads.html" title="Voir les leads des formulaires">
    📨 Voir les leads
    <span class="badge empty" id="leadsCount"></span>
  </a>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="/admin/preview.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        } else {
          // Afficher le nombre de leads des 7 derniers jours dans le badge
          user.jwt().then(token => {
            fetch("/api/leads", { headers: { Authorization: "Bearer " + token } })
              .then(r => r.ok ? r.json() : null)
              .then(data => {
                if (!data || !data.submissions) return;
                const recent = data.submissions.filter(s =>
                  new Date(s.created_at) > new Date(Date.now() - 7 * 86400000)
                ).length;
                const badge = document.getElementById("leadsCount");
                if (badge) {
                  if (recent > 0) {
                    badge.textContent = recent;
                    badge.classList.remove("empty");
                  } else {
                    badge.classList.add("empty");
                  }
                }
              })
              .catch(() => {});
          });
        }
      });
    }
  </script>
</body>
</html>
