  - name: "zones"
    label: "🗺️ Zones de vente (/vendre/...)"
    label_singular: "Zone"
    folder: "content/zones"
    create: false
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{titre_seo}}"
    fields:
      # --- Hero / bannière ---
      - { name: "video", label: "🎬 Vidéo de fond hero (bannière)", widget: "file", required: false, hint: "Uploade un .mp4 ou choisis une vidéo existante (/videos/secteurs/). Laisse vide pour un fond sans vidéo." }
      - { name: "titre_seo", label: "Titre SEO (onglet navigateur)", widget: "string" }
      - { name: "hero_surtitre", label: "Hero · surtitre (au-dessus du H1)", widget: "string", required: false }
      - { name: "h1", label: "Hero · titre H1", widget: "string" }
      - { name: "intro", label: "Hero · paragraphes intro", widget: "list", field: { name: "p", label: "Paragraphe", widget: "text" } }
      - { name: "intro_complement", label: "Paragraphe complémentaire hero (optionnel)", widget: "text", required: false }
      - { name: "communes_label", label: "Hero · ligne communes (petit texte or)", widget: "string", required: false }
      - { name: "hero_cta_label", label: "Hero · libellé du bouton principal", widget: "string", required: false }
      - { name: "hero_reassurance", label: "Hero · texte de réassurance sous les boutons", widget: "string", required: false }
      - { name: "retour_label", label: "Hero · lien retour (← Vendre)", widget: "string", required: false }
      - { name: "image", label: "🖼️ Image de fond hero (alternative à la vidéo)", widget: "image", required: false, hint: "Si la vidéo ci-dessus est vide, c'est cette image qui sert de fond au hero. Permet d'avoir une image au lieu d'une vidéo." }
      # --- Section Atouts ---
      - { name: "atouts_surtitre", label: "Atouts · surtitre", widget: "string", required: false }
      - { name: "atouts_titre", label: "Atouts · titre", widget: "string", required: false }
      - name: "atouts"
        label: "Atouts (cartes)"
        widget: "list"
        fields:
          - { name: "titre", label: "Titre", widget: "string" }
          - { name: "desc", label: "Description", widget: "text" }
      # --- Section Processus ---
      - { name: "process_surtitre", label: "Processus · surtitre", widget: "string", required: false }
      - { name: "process_titre", label: "Processus · titre", widget: "string", required: false }
      - name: "etapes"
        label: "Processus · étapes"
        widget: "list"
        required: false
        collapsed: true
        fields:
          - { name: "num", label: "Numéro (01, 02…)", widget: "string" }
          - { name: "titre", label: "Titre de l'étape", widget: "string" }
          - { name: "desc", label: "Description", widget: "text" }
      # --- Section Positionnement (communes) ---
      - { name: "positionnement_surtitre", label: "Positionnement · surtitre", widget: "string", required: false }
      - { name: "positionnement_titre", label: "Positionnement · titre", widget: "text", required: false }
      - { name: "positionnement_texte", label: "Positionnement · paragraphe", widget: "text", required: false }
      - { name: "communes_principales_label", label: "Libellé « Communes principales »", widget: "string", required: false }
