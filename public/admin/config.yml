              - { name: "titre", label: "Titre", widget: "string" }
              - name: "items"
                label: "Piliers (4)"
                widget: "list"
                fields:
                  - { name: "titre", label: "Titre", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
          - name: "services"
            label: "Services"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre", widget: "string" }
              - name: "items"
                label: "Services (4)"
                widget: "list"
                fields:
                  - { name: "titre", label: "Titre", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
          - name: "secteurs_section"
            label: "Section secteurs"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "intro", label: "Intro", widget: "text" }
          - name: "romain_card"
            label: "Carte Romain"
            widget: "object"
            fields:
              - { name: "titre", label: "Titre", widget: "string" }
