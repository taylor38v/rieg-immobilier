          - name: "hero"
            label: "Hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "video", label: "Vidéo de fond", widget: "file" }
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H1", widget: "string" }
              - { name: "intro", label: "Paragraphe intro", widget: "text" }
              - { name: "intro_complement", label: "Paragraphe complémentaire (optionnel)", widget: "text", required: false }
              - { name: "cta_primary_label", label: "Bouton 1 - texte", widget: "string" }
              - { name: "cta_primary_href", label: "Bouton 1 - lien", widget: "string" }
              - { name: "cta_secondary_label", label: "Bouton 2 - texte", widget: "string" }
              - { name: "cta_secondary_url", label: "Bouton 2 - URL (WhatsApp)", widget: "string" }
              - { name: "mention", label: "Mention rassurance", widget: "string" }
          - name: "pourquoi_moi"
            label: "Pourquoi vendre avec moi"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - name: "items"
                label: "Raisons (5)"
                widget: "list"
                fields:
                  - { name: "titre", label: "Titre", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
          - name: "comparatif"
            label: "Comparatif vendre seul / avec moi"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "badge", label: "Badge colonne 'avec' (⭐ Mon accompagnement)", widget: "string", required: false }
              - { name: "label_avec", label: "Label colonne 'avec'", widget: "string" }
              - { name: "label_sans", label: "Label colonne 'sans'", widget: "string" }
