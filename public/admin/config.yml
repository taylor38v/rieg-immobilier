            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - name: "items"
                label: "Engagements (6)"
                widget: "list"
                fields:
                  - { name: "titre", label: "Titre", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
          - name: "cta_final"
            label: "CTA bas de page"
            widget: "object"
            fields:
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "cta_label", label: "Bouton — texte", widget: "string" }
              - { name: "cta_href", label: "Bouton — lien", widget: "string" }

      - file: "content/site/contact.json"
        label: "📞 Contact"
        name: "contact"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string" }
          - { name: "meta_description", label: "Description SEO", widget: "text" }
          - name: "hero"
            label: "Hero"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre H1", widget: "string" }
              - { name: "intro", label: "Intro", widget: "text" }
              - { name: "garanties", label: "Garanties (3)", widget: "list" }
          - name: "calendrier"
            label: "Calendrier Cal.com"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "intro", label: "Intro", widget: "text" }
              - { name: "puces", label: "Puces (3)", widget: "list" }
              - { name: "cal_url", label: "URL Cal.com", widget: "string" }
              - { name: "cta_label", label: "Bouton — texte", widget: "string" }
          - name: "sidebar"
            label: "Sidebar contact"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "telephone", label: "Téléphone affiché", widget: "string" }
              - { name: "telephone_lien", label: "Téléphone format international", widget: "string" }
              - { name: "whatsapp_label", label: "WhatsApp — label", widget: "string" }
              - { name: "whatsapp_url", label: "WhatsApp — URL", widget: "string" }
              - { name: "calcom_label", label: "Cal.com — label", widget: "string" }
              - { name: "email", label: "Email", widget: "string" }
              - { name: "horaires_titre", label: "Horaires titre", widget: "string" }
              - { name: "horaires_detail", label: "Horaires détail", widget: "string" }
              - { name: "horaires_note", label: "Horaires note", widget: "string" }
          - name: "engagement"
            label: "Encart engagement (bleu)"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "items", label: "Items (4)", widget: "list" }
          - { name: "footer_form_note", label: "Note bas formulaire", widget: "text" }

      - file: "content/site/honoraires.json"
        label: "💰 Honoraires"
        name: "honoraires"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string" }
          - { name: "surtitre", label: "Surtitre", widget: "string" }
          - { name: "titre", label: "Titre H1", widget: "string" }
          - { name: "intro", label: "Intro", widget: "text" }
          - name: "tranches"
            label: "Tranches d'honoraires"
            widget: "list"
            fields:
              - { name: "tranche", label: "Tranche (Jusqu'à...)", widget: "string" }
              - { name: "pct", label: "Pourcentage", widget: "string" }
              - { name: "mini", label: "Mention (minimum...)", widget: "string", required: false }
          - { name: "mention_bas_de_page", label: "Mention bas de page", widget: "text" }

      - file: "content/site/vendre.json"
        label: "🏷️ Vendre"
        name: "vendre"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string" }
          - { name: "meta_description", label: "Description SEO", widget: "text" }
          - name: "hero"
