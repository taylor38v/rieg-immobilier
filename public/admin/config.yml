backend:
  name: git-gateway
  branch: master
  squash_merges: true
  commit_messages:
    create: 'CMS · {{collection}} ajouté · {{slug}}'
    update: 'CMS · {{collection}} mis à jour · {{slug}}'
    delete: 'CMS · {{collection}} supprimé · {{slug}}'
    uploadMedia: 'CMS · upload média · {{path}}'
    deleteMedia: 'CMS · suppression média · {{path}}'

local_backend: true

publish_mode: simple

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://romainrieg-immobilier.fr
display_url: https://romainrieg-immobilier.fr
logo_url: https://romainrieg-immobilier.fr/photos/IAD_LOGO_FINAL-removebg-preview.png

locale: fr

collections:

  - name: "articles"
    label: "📰 Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{titre}} · {{rubrique}} · {{date}}"
    sortable_fields: [date, titre, rubrique]
    fields:
      - { name: "titre", label: "Titre", widget: "string" }
      - { name: "chapo", label: "Chapô (résumé court)", widget: "text" }
      - { name: "rubrique", label: "Rubrique", widget: "select", options: ["Baromètre", "Portrait", "Décryptage", "Patrimoine", "Conseils", "Actualité"] }
      - { name: "date", label: "Date de publication", widget: "datetime", picker_utc: false, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "duree_lecture", label: "Durée de lecture (min)", widget: "number", default: 5, min: 1, max: 30 }
      - { name: "auteur", label: "Auteur", widget: "string", default: "Romain Rieg" }
      - { name: "image", label: "Image principale", widget: "image", required: false }
      - { name: "publie", label: "Publié sur le site", widget: "boolean", default: true }
      - { name: "body", label: "Contenu de l'article", widget: "markdown" }

  - name: "pages"
    label: "📄 Pages libres"
    label_singular: "Page"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{titre}} · /{{slug}}/"
    fields:
      - { name: "titre", label: "Titre de la page", widget: "string" }
      - { name: "description", label: "Meta description (SEO)", widget: "text", required: false }
      - { name: "hero_image", label: "Image de couverture", widget: "image", required: false }
      - { name: "publie", label: "Publié", widget: "boolean", default: true }
      - { name: "body", label: "Contenu", widget: "markdown" }

  - name: "site"
    label: "🌐 Pages du site"
    label_singular: "Page du site"
    description: "Modifie les textes de chaque page existante du site (home, à propos, vendre, acheter…)."
    files:
      - file: "content/site/home.json"
        label: "🏠 Accueil"
        name: "home"
        format: "json"
        fields:
          - name: "hero"
            label: "1. Hero (haut de page)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "video", label: "Vidéo de fond (drone, .mp4)", widget: "file", media_library: { config: { multiple: false } }, hint: "Vidéos existantes dans /videos/secteurs/ : saint-cyr, ecully, limonest, saint-didier, saint-just. Tu peux aussi uploader la tienne." }
              - { name: "chip", label: "Pastille (Saint-Didier · Ouest lyonnais...)", widget: "string" }
              - { name: "titre", label: "Titre principal H1", widget: "string" }
              - { name: "intro", label: "Paragraphe d'intro", widget: "text" }
              - { name: "cta_primary_label", label: "Bouton principal - texte", widget: "string" }
              - { name: "cta_primary_href", label: "Bouton principal - lien", widget: "string", hint: "Page interne (ex: /contact) ou URL externe (https://...)." }
              - { name: "cta_secondary_label", label: "Bouton secondaire - texte", widget: "string" }
              - { name: "cta_secondary_href", label: "Bouton secondaire - lien", widget: "string", hint: "Page interne (ex: /rejoindre) ou URL externe." }
              - { name: "mention", label: "Mention rassurance (Zéro engagement...)", widget: "string" }
              - name: "stats"
                label: "Chiffres clés (4)"
                widget: "list"
                fields:
                  - { name: "valeur", label: "Valeur", widget: "string" }
                  - { name: "label", label: "Label", widget: "string" }
          - name: "biens_iad"
            label: "2. Bandeau biens iad"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "desc", label: "Description", widget: "text" }
              - { name: "cta_label", label: "Bouton - texte", widget: "string" }
              - { name: "cta_url", label: "Bouton - lien (URL externe)", widget: "string" }
          - name: "qui_suis_je"
            label: "3. Qui suis-je"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "paragraphes", label: "Paragraphes (markdown : **gras**, _italique_)", widget: "list", field: { name: "p", label: "Paragraphe", widget: "text" } }
              - { name: "photo", label: "Photo (chemin /photos/...)", widget: "image" }
              - { name: "photo_alt", label: "Photo - texte alternatif", widget: "string" }
              - { name: "citation", label: "Citation (carte dorée)", widget: "string" }
              - { name: "citation_auteur", label: "Citation - auteur", widget: "string" }
              - { name: "cta_primary_label", label: "Bouton principal - texte", widget: "string" }
              - { name: "cta_primary_href", label: "Bouton principal - lien", widget: "string", hint: "Page interne (ex: /contact) ou URL externe (https://...)." }
              - { name: "cta_secondary_label", label: "Bouton secondaire - texte", widget: "string" }
              - { name: "cta_secondary_href", label: "Bouton secondaire - lien", widget: "string", hint: "Page interne (ex: /rejoindre) ou URL externe." }
          - name: "services"
            label: "4. Mes services (4 cartes)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "item_prefix", label: "Préfixe carte (Service 01…)", widget: "string", required: false }
              - { name: "item_cta_label", label: "Lien carte (Découvrir)", widget: "string", required: false }
              - name: "items"
                label: "Services (4 max)"
                widget: "list"
                max: 4
                fields:
                  - { name: "titre", label: "Titre du service", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
                  - { name: "href", label: "Lien (page)", widget: "string" }
          - name: "secteurs"
            label: "5. Mes secteurs d'intervention (3 zones)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "intro", label: "Paragraphe d'intro", widget: "text" }
              - { name: "lien_label", label: "Lien carte zone (Découvrir la zone →)", widget: "string", required: false }
              - name: "zones"
                label: "Zones (3)"
                widget: "list"
                fields:
                  - { name: "slug", label: "Slug (= sous /vendre/...)", widget: "string" }
                  - { name: "titre", label: "Titre zone", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
                  - { name: "badge", label: "Badge en haut de la carte", widget: "string" }
                  - { name: "image", label: "Image", widget: "image" }
          - name: "instagram"
            label: "6. Coulisses Instagram (3 reels)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "intro", label: "Paragraphe d'intro", widget: "text" }
              - { name: "lien", label: "Lien Instagram global (profil)", widget: "string" }
              - { name: "reel_label", label: "Étiquette des vignettes (Reel)", widget: "string", required: false }
              - name: "videos"
                label: "Vignettes reels (3)"
                widget: "list"
                fields:
                  - { name: "titre", label: "Titre du reel", widget: "string" }
                  - { name: "duree", label: "Durée (1:20)", widget: "string" }
                  - { name: "thumb", label: "Vignette", widget: "image" }
                  - { name: "url", label: "Lien direct du reel (https://instagram.com/reel/...)", widget: "string", required: false }
              - { name: "cta_label", label: "Bouton bas - texte", widget: "string" }
          - name: "avis"
            label: "7. Avis Google"
            widget: "object"
            collapsed: true
            fields:
              - { name: "badge_label", label: "Étiquette badge (à côté de « Google »)", widget: "string", required: false }
              - { name: "note_chiffre", label: "Note (5/5)", widget: "string", required: false }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "texte", label: "Paragraphe", widget: "text" }
              - name: "items"
                label: "Avis affichés (carrousel)"
                widget: "list"
                required: false
                collapsed: true
                fields:
                  - { name: "nom", label: "Nom du client", widget: "string" }
                  - { name: "contexte", label: "Contexte (Vendeur · Appartement…)", widget: "string", required: false }
                  - { name: "texte", label: "Texte de l'avis", widget: "text" }
              - { name: "cta_label", label: "Bouton - texte", widget: "string" }
              - { name: "cta_url", label: "Bouton - lien Google", widget: "string" }

      - file: "content/site/a-propos.json"
        label: "👤 À propos"
        name: "a-propos"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string", hint: "Titre affiché dans l'onglet du navigateur et dans les résultats Google. 50-60 caractères max." }
          - { name: "meta_description", label: "Description SEO", widget: "text", hint: "Texte sous le titre dans les résultats Google. 150-160 caractères." }
          - name: "hero"
            label: "Hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre_l1", label: "Titre H1 (ligne 1)", widget: "string" }
              - { name: "titre_l2", label: "Titre H1 (ligne 2)", widget: "string" }
              - { name: "paragraphes", label: "Paragraphes", widget: "list", field: { name: "p", label: "Paragraphe", widget: "text" } }
              - { name: "photo", label: "Photo", widget: "image" }
              - { name: "photo_alt", label: "Photo - alt", widget: "string" }
              - name: "stats"
                label: "Stats (3)"
                widget: "list"
                fields:
                  - { name: "valeur", label: "Valeur", widget: "string" }
                  - { name: "label", label: "Label", widget: "string" }
          - name: "engagements"
            label: "Engagements"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - name: "items"
                label: "Engagements (6)"
                widget: "list"
                fields:
                  - { name: "titre", label: "Titre", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
          - name: "cta_final"
            label: "CTA bas de page"
            widget: "object"
            collapsed: true
            fields:
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "cta_label", label: "Bouton - texte", widget: "string" }
              - { name: "cta_href", label: "Bouton - lien", widget: "string" }

      - file: "content/site/contact.json"
        label: "📞 Contact"
        name: "contact"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string", hint: "Titre affiché dans l'onglet du navigateur et dans les résultats Google. 50-60 caractères max." }
          - { name: "meta_description", label: "Description SEO", widget: "text", hint: "Texte sous le titre dans les résultats Google. 150-160 caractères." }
          - name: "hero"
            label: "Hero"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H1", widget: "string" }
              - { name: "intro", label: "Intro", widget: "text", hint: "Court paragraphe d'introduction sous le titre." }
              - { name: "garanties", label: "Garanties (3)", widget: "list" }
          - name: "calendrier"
            label: "Calendrier Cal.com"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "intro", label: "Intro", widget: "text", hint: "Court paragraphe d'introduction sous le titre." }
              - { name: "puces", label: "Puces (3)", widget: "list" }
              - { name: "cal_url", label: "URL Cal.com", widget: "string" }
              - { name: "cta_label", label: "Bouton - texte", widget: "string" }
          - name: "sidebar"
            label: "Sidebar contact"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "telephone", label: "Téléphone affiché", widget: "string" }
              - { name: "telephone_lien", label: "Téléphone format international", widget: "string" }
              - { name: "whatsapp_label", label: "WhatsApp - label", widget: "string" }
              - { name: "whatsapp_url", label: "WhatsApp - URL", widget: "string" }
              - { name: "formulaire_label", label: "Formulaire - label (Remplir un formulaire)", widget: "string", required: false }
              - { name: "calcom_label", label: "Cal.com - label", widget: "string" }
              - { name: "email", label: "Email", widget: "string" }
              - { name: "horaires_titre", label: "Horaires titre", widget: "string" }
              - { name: "horaires_detail", label: "Horaires détail", widget: "string" }
              - { name: "horaires_note", label: "Horaires note", widget: "string" }
          - name: "engagement"
            label: "Encart engagement (bleu)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "items", label: "Items (4)", widget: "list" }
          - { name: "footer_form_titre", label: "Titre bas formulaire (Pourquoi ce formulaire détaillé ?)", widget: "string", required: false }
          - { name: "footer_form_note", label: "Note bas formulaire", widget: "text" }

      - file: "content/site/honoraires.json"
        label: "💰 Honoraires"
        name: "honoraires"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string", hint: "Titre affiché dans l'onglet du navigateur et dans les résultats Google. 50-60 caractères max." }
          - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
          - { name: "titre", label: "Titre H1", widget: "string" }
          - { name: "intro", label: "Intro", widget: "text", hint: "Court paragraphe d'introduction sous le titre." }
          - name: "tranches"
