              - name: "items"
                label: "Lignes du comparatif"
                widget: "list"
                fields:
                  - { name: "avec", label: "Avec moi", widget: "string" }
                  - { name: "sans", label: "Tout seul", widget: "string" }
          - name: "etapes"
            label: "Étapes du processus"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - name: "items"
                label: "Étapes (4)"
                widget: "list"
                fields:
                  - { name: "num", label: "Numéro (01, 02...)", widget: "string" }
                  - { name: "titre", label: "Titre", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
          - name: "secteurs_section"
            label: "Section secteurs (avec carte)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "intro", label: "Intro", widget: "text", hint: "Court paragraphe d'introduction sous le titre." }
              - { name: "groupe_mont_dor_label", label: "Libellé groupe Ouest Lyonnais", widget: "string", required: false }
              - { name: "groupe_forez_label", label: "Libellé groupe Plaine du Forez", widget: "string", required: false }
          - name: "zones_section"
            label: "Section 3 zones"
            widget: "object"
            collapsed: true
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string", hint: "Petit texte en or affiché au-dessus du titre H2." }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "lien_label", label: "Lien carte zone (Vendre dans cette zone →)", widget: "string", required: false }
              - name: "zones"
                label: "Zones (3)"
                widget: "list"
                fields:
                  - { name: "slug", label: "Slug", widget: "string" }
                  - { name: "titre", label: "Titre", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
                  - { name: "image", label: "Image", widget: "image" }
          - name: "cta_final"
            label: "CTA bas de page"
            widget: "object"
            collapsed: true
            fields:
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "intro", label: "Intro", widget: "text", hint: "Court paragraphe d'introduction sous le titre." }
              - { name: "cta_primary_label", label: "Bouton 1 - texte", widget: "string" }
              - { name: "cta_primary_href", label: "Bouton 1 - lien", widget: "string" }
              - { name: "cta_whatsapp_label", label: "Bouton WhatsApp", widget: "string" }
              - { name: "cta_whatsapp_url", label: "Bouton WhatsApp URL", widget: "string" }

      - file: "content/site/acheter.json"
        label: "🔑 Acheter"
        name: "acheter"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string", hint: "Titre affiché dans l'onglet du navigateur et dans les résultats Google. 50-60 caractères max." }
          - { name: "meta_description", label: "Description SEO", widget: "text", hint: "Texte sous le titre dans les résultats Google. 150-160 caractères." }
          - name: "hero"
