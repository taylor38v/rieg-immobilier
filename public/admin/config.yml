      - { name: "limitrophes_note", label: "Note sous les limitrophes", widget: "text", required: false }
      # --- Section Carte ---
      - { name: "carte_surtitre", label: "Carte · surtitre", widget: "string", required: false }
      - { name: "carte_titre", label: "Carte · titre", widget: "string", required: false }
      - { name: "carte_texte", label: "Carte · texte d'intro", widget: "text", required: false }
      # --- CTA final ---
      - { name: "cta_titre", label: "CTA final · titre", widget: "string", required: false }
      - { name: "cta_intro", label: "CTA final · sous-titre", widget: "text", required: false }

