backend:
  name: git-gateway
  branch: master
  squash_merges: true
  commit_messages:
    create: 'CMS · {{collection}} ajouté · {{slug}}'
    update: 'CMS · {{collection}} mis à jour · {{slug}}'
    delete: 'CMS · {{collection}} supprimé · {{slug}}'
    uploadMedia: 'CMS · upload média · {{path}}'
    deleteMedia: 'CMS · suppression média · {{path}}'

local_backend: true

publish_mode: simple

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://rieg-immobilier-preview.netlify.app
display_url: https://rieg-immobilier-preview.netlify.app
logo_url: https://rieg-immobilier-preview.netlify.app/photos/IAD_LOGO_FINAL-removebg-preview.png

locale: fr

collections:

  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{titre}} · {{rubrique}} · {{date}}"
    sortable_fields: [date, titre, rubrique]
    fields:
      - { name: "titre", label: "Titre", widget: "string" }
      - { name: "chapo", label: "Chapô (résumé court)", widget: "text" }
      - { name: "rubrique", label: "Rubrique", widget: "select", options: ["Baromètre", "Portrait", "Décryptage", "Patrimoine", "Conseils", "Actualité"] }
      - { name: "date", label: "Date de publication", widget: "datetime", picker_utc: false, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "duree_lecture", label: "Durée de lecture (min)", widget: "number", default: 5, min: 1, max: 30 }
      - { name: "auteur", label: "Auteur", widget: "string", default: "Romain Rieg" }
      - { name: "image", label: "Image principale", widget: "image", required: false }
      - { name: "publie", label: "Publié sur le site", widget: "boolean", default: true }
      - { name: "body", label: "Contenu de l'article", widget: "markdown" }

  - name: "temoignages"
    label: "Témoignages clients"
    label_singular: "Témoignage"
    folder: "content/temoignages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{nom}} · {{ville}} · {{note}}/5"
    sortable_fields: [date, note]
    fields:
      - { name: "nom", label: "Nom du client (initiales possible)", widget: "string" }
      - { name: "ville", label: "Ville", widget: "string" }
      - { name: "contexte", label: "Contexte (Vendeur, Acheteur, type de bien…)", widget: "string" }
      - { name: "note", label: "Note sur 5", widget: "number", min: 1, max: 5, default: 5 }
      - { name: "date", label: "Date", widget: "datetime", picker_utc: false, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "publie", label: "Publié sur le site", widget: "boolean", default: true }
      - { name: "body", label: "Témoignage", widget: "text" }

  - name: "pages"
    label: "Pages libres"
    label_singular: "Page"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{titre}} · /{{slug}}/"
    fields:
      - { name: "titre", label: "Titre de la page", widget: "string" }
      - { name: "description", label: "Meta description (SEO)", widget: "text", required: false }
      - { name: "hero_image", label: "Image de couverture", widget: "image", required: false }
      - { name: "publie", label: "Publié", widget: "boolean", default: true }
      - { name: "body", label: "Contenu", widget: "markdown" }

  - name: "site"
    label: "Pages du site"
    label_singular: "Page du site"
    description: "Modifie les textes de chaque page existante du site (home, à propos, vendre, acheter…)."
    files:
      - file: "content/site/home.json"
        label: "🏠 Accueil"
        name: "home"
        format: "json"
        fields:
          - name: "hero"
            label: "1. Hero (haut de page)"
            widget: "object"
            fields:
              - { name: "video", label: "Vidéo de fond (drone, .mp4)", widget: "file", media_library: { config: { multiple: false } }, hint: "Vidéos existantes dans /videos/secteurs/ : saint-cyr, ecully, limonest, saint-didier, saint-just. Tu peux aussi uploader la tienne." }
              - { name: "chip", label: "Pastille (Saint-Didier · Ouest lyonnais...)", widget: "string" }
              - { name: "titre", label: "Titre principal H1", widget: "string" }
              - { name: "intro", label: "Paragraphe d'intro", widget: "text" }
              - { name: "cta_primary_label", label: "Bouton principal — texte", widget: "string" }
              - { name: "cta_primary_href", label: "Bouton principal — lien", widget: "string" }
              - { name: "cta_secondary_label", label: "Bouton secondaire — texte", widget: "string" }
              - { name: "cta_secondary_href", label: "Bouton secondaire — lien", widget: "string" }
              - { name: "mention", label: "Mention rassurance (Zéro engagement...)", widget: "string" }
              - name: "stats"
                label: "Chiffres clés (4)"
                widget: "list"
                fields:
                  - { name: "valeur", label: "Valeur", widget: "string" }
                  - { name: "label", label: "Label", widget: "string" }
          - name: "biens_iad"
            label: "2. Bandeau biens iad"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "desc", label: "Description", widget: "text" }
              - { name: "cta_label", label: "Bouton — texte", widget: "string" }
              - { name: "cta_url", label: "Bouton — lien (URL externe)", widget: "string" }
          - name: "qui_suis_je"
            label: "3. Qui suis-je"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "paragraphes", label: "Paragraphes (markdown : **gras**, _italique_)", widget: "list", field: { name: "p", label: "Paragraphe", widget: "text" } }
              - { name: "photo", label: "Photo (chemin /photos/...)", widget: "image" }
              - { name: "photo_alt", label: "Photo — texte alternatif", widget: "string" }
              - { name: "citation", label: "Citation (carte dorée)", widget: "string" }
              - { name: "citation_auteur", label: "Citation — auteur", widget: "string" }
              - { name: "cta_primary_label", label: "Bouton principal — texte", widget: "string" }
              - { name: "cta_primary_href", label: "Bouton principal — lien", widget: "string" }
              - { name: "cta_secondary_label", label: "Bouton secondaire — texte", widget: "string" }
              - { name: "cta_secondary_href", label: "Bouton secondaire — lien", widget: "string" }
          - name: "services"
            label: "4. Mes services (4 cartes)"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - name: "items"
                label: "Services (4 max)"
                widget: "list"
                max: 4
                fields:
                  - { name: "titre", label: "Titre du service", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
                  - { name: "href", label: "Lien (page)", widget: "string" }
          - name: "secteurs"
            label: "5. Mes secteurs d'intervention (3 zones)"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "intro", label: "Paragraphe d'intro", widget: "text" }
              - name: "zones"
                label: "Zones (3)"
                widget: "list"
                fields:
                  - { name: "slug", label: "Slug (= sous /vendre/...)", widget: "string" }
                  - { name: "titre", label: "Titre zone", widget: "string" }
                  - { name: "desc", label: "Description", widget: "text" }
                  - { name: "badge", label: "Badge en haut de la carte", widget: "string" }
                  - { name: "image", label: "Image", widget: "image" }
          - name: "instagram"
            label: "6. Coulisses Instagram (3 reels)"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - { name: "intro", label: "Paragraphe d'intro", widget: "text" }
              - { name: "lien", label: "Lien Instagram global (profil)", widget: "string" }
              - name: "videos"
                label: "Vignettes reels (3)"
                widget: "list"
                fields:
                  - { name: "titre", label: "Titre du reel", widget: "string" }
                  - { name: "duree", label: "Durée (1:20)", widget: "string" }
                  - { name: "thumb", label: "Vignette", widget: "image" }
                  - { name: "url", label: "Lien direct du reel (https://instagram.com/reel/...)", widget: "string", required: false }
              - { name: "cta_label", label: "Bouton bas — texte", widget: "string" }
          - name: "avis"
            label: "7. Avis Google (3 témoignages)"
            widget: "object"
            fields:
              - { name: "note_chiffre", label: "Note (4,9/5)", widget: "string" }
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre", label: "Titre H2", widget: "string" }
              - name: "items"
                label: "Avis (3)"
                widget: "list"
                fields:
                  - { name: "nom", label: "Nom client", widget: "string" }
                  - { name: "contexte", label: "Contexte (Vendeur · Maison...)", widget: "string" }
                  - { name: "texte", label: "Texte de l'avis", widget: "text" }
              - { name: "cta_label", label: "Bouton — texte", widget: "string" }
              - { name: "cta_url", label: "Bouton — lien Google", widget: "string" }
          - name: "cta_final"
            label: "8. CTA bas de page"
            widget: "object"
            fields:
              - { name: "titre", label: "Titre", widget: "string" }
              - { name: "intro", label: "Paragraphe", widget: "text" }
              - { name: "cta_primary_label", label: "Bouton 1 — texte", widget: "string" }
              - { name: "cta_primary_href", label: "Bouton 1 — lien", widget: "string" }
              - { name: "cta_secondary_label", label: "Bouton 2 — texte", widget: "string" }
              - { name: "cta_secondary_href", label: "Bouton 2 — lien (tel:..., mailto:...)", widget: "string" }

      - file: "content/site/a-propos.json"
        label: "👤 À propos"
        name: "a-propos"
        format: "json"
        fields:
          - { name: "meta_title", label: "Titre SEO", widget: "string" }
          - { name: "meta_description", label: "Description SEO", widget: "text" }
          - name: "hero"
            label: "Hero"
            widget: "object"
            fields:
              - { name: "surtitre", label: "Surtitre", widget: "string" }
              - { name: "titre_l1", label: "Titre H1 (ligne 1)", widget: "string" }
              - { name: "titre_l2", label: "Titre H1 (ligne 2)", widget: "string" }
              - { name: "paragraphes", label: "Paragraphes", widget: "list", field: { name: "p", label: "Paragraphe", widget: "text" } }
